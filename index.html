<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CHAGE and ASKA Tribute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      width: 100%;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
      font-weight: 300;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #aaa;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1507838153414-b4b713384a76?q=80&w=2070') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero h2 {
      font-size: 48px;
      letter-spacing: 5px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(20px);
    }

    .hero p {
      color: #ccc;
      font-size: 16px;
      opacity: 0;
      transform: translateY(20px);
    }

    section {
      padding: 100px 40px;
      max-width: 1000px;
      margin: auto;
    }

    section h3 {
      font-size: 28px;
      margin-bottom: 30px;
      border-left: 3px solid #fff;
      padding-left: 15px;
    }

    .about p {
      line-height: 1.8;
      color: #bbb;
    }

    .discography {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #555;
    }

    .card h4 {
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
      border-top: 1px solid #222;
    }

    /* フェードイン */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: 1s;
    }

    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<header>
  <h1>CHAGE & ASKA</h1>
  <nav>
    <a href="#about">ABOUT</a>
    <a href="#music">MUSIC</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2 id="main-title">CHAGE & ASKA</h2>
    <p id="sub-title">Timeless Voices, Eternal Melodies</p>
  </div>
</section>

<section id="about" class="about fade-in">
  <h3>ABOUT</h3>
  <p>
    日本を代表する音楽ユニットとして長年にわたり活躍し、
    数々の名曲を世に送り出してきた存在。
    心に響く歌詞と圧倒的なボーカルで、多くの人々に影響を与え続けている。
  </p>
</section>

<section id="music" class="fade-in">
  <h3>DISCOGRAPHY</h3>
  <div class="discography">
    <div class="card">
      <h4>SAY YES</h4>
      <p>代表曲のひとつ。圧倒的な支持を得た名曲。</p>
    </div>
    <div class="card">
      <h4>YAH YAH YAH</h4>
      <p>エネルギッシュな楽曲で幅広い世代に人気。</p>
    </div>
    <div class="card">
      <h4>LOVE SONG</h4>
      <p>繊細で深い感情を描いた名バラード。</p>
    </div>
  </div>
</section>

<footer>
  <p>© Tribute Site</p>
</footer>

<script>
  // ヒーローテキスト アニメーション
  window.addEventListener("load", () => {
    document.getElementById("main-title").style.opacity = "1";
    document.getElementById("main-title").style.transform = "translateY(0)";

    setTimeout(() => {
      document.getElementById("sub-title").style.opacity = "1";
      document.getElementById("sub-title").style.transform = "translateY(0)";
    }, 500);
  });

  // スクロールフェードイン
  const elements = document.querySelectorAll('.fade-in');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
