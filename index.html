<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CHAGE and ASKA Tribute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      width: 100%;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
      font-weight: 300;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #aaa;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    /* ===== ヒーロー画像（スライド） ===== */
    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .hero img.active {
      opacity: 1;
    }

    /* 画像の上に黒いフィルター */
    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .hero-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
    }

    .hero h2 {
      font-size: 48px;
      letter-spacing: 5px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: 1s;
    }

    .hero p {
      color: #ccc;
      font-size: 16px;
      opacity: 0;
      transform: translateY(20px);
      transition: 1s;
    }

    section {
      padding: 100px 40px;
      max-width: 1000px;
      margin: auto;
    }

    section h3 {
      font-size: 28px;
      margin-bottom: 30px;
      border-left: 3px solid #fff;
      padding-left: 15px;
    }

    .about p {
      line-height: 1.8;
      color: #bbb;
    }

    .discography {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #555;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
      border-top: 1px solid #222;
    }

    /* スクロールフェード */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: 1s;
    }

    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<header>
  <h1>CHAGE & ASKA</h1>
  <nav>
    <a href="#about">ABOUT</a>
    <a href="#music">MUSIC</a>
  </nav>
</header>

<!-- ===== 画像スライド部分 ===== -->
<section class="hero">
  <img src="image1.jpg" class="active">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">

  <div class="hero-content">
    <h2 id="main-title">CHAGE & ASKA</h2>
    <p id="sub-title">Timeless Voices, Eternal Melodies</p>
  </div>
</section>

<section id="about" class="about fade-in">
  <h3>ABOUT</h3>
  <p>
    日本を代表する音楽ユニットとして長年にわたり活躍し、
    数々の名曲を世に送り出してきた存在。
    心に響く歌詞と圧倒的なボーカルで、多くの人々に影響を与え続けている。
  </p>
</section>

<section id="music" class="fade-in">
  <h3>DISCOGRAPHY</h3>
  <div class="discography">
    <div class="card">
      <h4>SAY YES</h4>
      <p>代表曲のひとつ。</p>
    </div>
    <div class="card">
      <h4>YAH YAH YAH</h4>
      <p>エネルギッシュな楽曲。</p>
    </div>
    <div class="card">
      <h4>LOVE SONG</h4>
      <p>名バラード。</p>
    </div>
  </div>
</section>

<footer>
  <p>© Tribute Site</p>
</footer>

<script>
  // ===== 画像スライド =====
  const images = document.querySelectorAll(".hero img");
  let current = 0;

  setInterval(() => {
    images[current].classList.remove("active");
    current = (current + 1) % images.length;
    images[current].classList.add("active");
  }, 3000);

  // ===== タイトルフェード =====
  window.addEventListener("load", () => {
    const title = document.getElementById("main-title");
    const sub = document.getElementById("sub-title");

    title.style.opacity = "1";
    title.style.transform = "translateY(0)";

    setTimeout(() => {
      sub.style.opacity = "1";
      sub.style.transform = "translateY(0)";
    }, 500);
  });

  // ===== スクロールフェード =====
  const elements = document.querySelectorAll('.fade-in');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
