<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CHAGE and ASKA Tribute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Helvetica Neue", Arial; }
    body { background:#0a0a0a; color:#fff; }

    header {
      position: fixed;
      width: 100%;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
    }

    nav a { margin-left:20px; text-decoration:none; color:#aaa; }
    nav a:hover { color:#fff; }

    .hero { height:100vh; position:relative; overflow:hidden; }
    .hero img { position:absolute; width:100%; height:100%; object-fit:cover; opacity:0; transition:1.5s; }
    .hero img.active { opacity:1; }

    .hero::after {
      content:""; position:absolute; width:100%; height:100%;
      background:rgba(0,0,0,0.5);
    }

    .hero-content {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      z-index:2; text-align:center;
    }

    section { padding:100px 40px; max-width:1100px; margin:auto; }

    h3 {
      font-size:28px; margin-bottom:30px;
      border-left:3px solid #fff; padding-left:15px;
    }

    .video-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:30px;
    }

    .video-card {
      background:#111; padding:15px;
      border:1px solid #222; transition:0.3s;
    }

    .video-card:hover { transform:translateY(-5px); border-color:#555; }

    .video-wrapper { position:relative; padding-top:56.25%; }
    .video-wrapper iframe {
      position:absolute; top:0; left:0;
      width:100%; height:100%; border:none;
    }

    .history { margin-top:80px; }

    .timeline { border-left:2px solid #555; padding-left:20px; }

    .timeline-item { margin-bottom:40px; }

    .timeline-item h4 { font-size:18px; margin-bottom:10px; }

    .timeline-item p { color:#bbb; line-height:1.6; }

    select {
      margin-bottom:20px;
      padding:10px;
      background:#111;
      color:#fff;
      border:1px solid #333;
    }

    footer { text-align:center; padding:40px; color:#777; }
  </style>
</head>

<body>

<header>
  <h1>CHAGE & ASKA</h1>
  <nav>
    <a href="#music">MUSIC</a>
  </nav>
</header>

<section class="hero">
  <img src="image1.jpg" class="active">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">

  <div class="hero-content">
    <h2>CHAGE & ASKA</h2>
    <p>Timeless Voices, Eternal Melodies</p>
  </div>
</section>

<section id="music">
  <h3>DISCOGRAPHY</h3>

  <div class="video-grid">
    <div class="video-card">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/Q9qAyt0G-jM"></iframe>
      </div>
      <h4>SAY YES</h4>
    </div>

    <div class="video-card">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/yfZIaTZJo0o"></iframe>
      </div>
      <h4>YAH YAH YAH</h4>
    </div>

    <div class="video-card">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/djfjKhzPzGU"></iframe>
      </div>
      <h4>LOVE SONG</h4>
    </div>
  </div>

  <!-- LIVE SETLIST -->
  <div class="history">
    <h3>LIVE Setlist</h3>

    <select id="yearFilter">
      <option value="1980">1980年</option>
      <option value="1981">1981年</option>
      <option value="1982">1982年</option>
    </select>

    <div id="setlistContainer" class="timeline"></div>
  </div>

  <div class="history">
    <h3>DISCOGRAPHY DETAILS</h3>
    <div class="timeline">
      <div class="timeline-item"><h4>1979年</h4><p>シングル：「ひとり咲き」<br>アルバム：「風舞」</p></div>
      <div class="timeline-item"><h4>1980年</h4><p>シングル：「万里の河」<br>アルバム：「熱風」</p></div>
      <div class="timeline-item"><h4>1981年</h4><p>シングル：「男と女」<br>アルバム：「黄昏の騎士」</p></div>
    </div>
  </div>

</section>

<footer>
  <p>© Tribute Site</p>
</footer>

<script>
const setlists = {

  "1980":[{title:"旅立ちコンサート",songs:[
    "追想","私の愛した人","翼","あとまわし","この恋おいらのからまわり",
    "冬に置きざり","夢から夢へ","冬の恋","風舞","ひとり咲き",
    "御意見無用","あばんぎゃるど","夏は過ぎて","流恋情歌",
    "終章(エピローグ)～追想の主題"
  ]}],

  "1981":[
    {title:"熱風'81",songs:[
      "翼","幻夜","万里の河","この恋おいらのからまわり","嘘","夢から夢へ",
      "花暦","ひとり咲き","終章(エピローグ)","熱風","夏は過ぎて",
      "荒野","悲炎～翼","旅浪人(TABIBITO)","歌いつづける"
    ]},
    {title:"ライブ・イン・田園コロシアム The 夏祭り'81",songs:[
      "序.小倉祇園太鼓～THE夏祭り'81","夏は過ぎて","幻夜","熱風","あとまわし",
      "流恋情歌","この恋おいらのからまわり","夢から夢へ","嘘","万里の河",
      "花暦","あばんぎゃるど","御意見無用","私の愛した人","悲炎","翼",
      "放浪人(TABIBITO)","荒野","歌い続ける","終章（エピローグ）",
      "真夏の国境","ひとり咲き"
    ]}
  ],

  "1982":[
    {title:"御意見無用'82",songs:[
      "御意見無用'82","暁","MARGARITA","万里の河","花暦","カーニバル",
      "終章(エピローグ)","21世紀","誓い","南十字星","魅惑","ひとり咲き",
      "歌いつづける","熱い想い"
    ]},
    {title:"THE 夏祭り'82",songs:[
      "夏は過ぎて","御意見無用'82","長い雨のあとに","万里の河","カーニバル",
      "花暦","男と女","21世紀","私の愛した人","翼","暁","魅惑",
      "誓い","南十字星","悲炎","翼","熱い想い","終章(エピローグ)",
      "幻夜","旅浪人(TABIBITO)","ひとり咲き","歌いつづける"
    ]}
  ]

};

function renderSetlist(year){
  const container=document.getElementById("setlistContainer");
  const data=setlists[year];

  if(!data){container.innerHTML="<p>データ準備中</p>";return;}

  let html="";
  data.forEach(live=>{
    let songs="";
    live.songs.forEach((s,i)=>{songs+=`${i+1}. ${s}<br>`;});
    html+=`<div class="timeline-item"><h4>${year}年『${live.title}』</h4><p>${songs}</p></div>`;
  });

  container.innerHTML=html;
}

renderSetlist("1980");

document.getElementById("yearFilter").addEventListener("change",(e)=>{
  renderSetlist(e.target.value);
});

const images=document.querySelectorAll(".hero img");
let current=0;
setInterval(()=>{
  images[current].classList.remove("active");
  current=(current+1)%images.length;
  images[current].classList.add("active");
},3000);
</script>

</body>
</html>
