<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CHAGE and ASKA Tribute</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Helvetica Neue",Arial;}
body{background:#0a0a0a;color:#fff;}

header{
position:fixed;width:100%;padding:20px 40px;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
z-index:1000;display:flex;justify-content:space-between;
}

nav a{margin-left:20px;text-decoration:none;color:#aaa;}
nav a:hover{color:#fff;}

.hero{height:100vh;position:relative;overflow:hidden;}
.hero img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:1.5s;}
.hero img.active{opacity:1;}

.hero-content{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:2;text-align:center;
}

section{padding:100px 40px;max-width:1100px;margin:auto;}

h3{
font-size:28px;margin-bottom:30px;
border-left:3px solid #fff;padding-left:15px;
}

/* 動画カード */
.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.video-card{
background:#111;padding:15px;border:1px solid #222;
cursor:pointer;transition:.3s;
}
.video-card:hover{
transform:translateY(-5px) scale(1.02);
border-color:#888;
}

.video-thumb{
width:100%;
height:180px;
background-size:cover;
background-position:center;
}

/* モーダル */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}
.modal iframe{
width:80%;
height:60%;
}

/* HISTORY */
.timeline{border-left:2px solid #555;padding-left:20px;}
.timeline-item{
margin-bottom:40px;
opacity:0;
transform:translateY(40px);
transition:0.6s;
}

.timeline-item.show{
opacity:1;
transform:translateY(0);
}

.timeline-item img{
width:100%;
margin-top:10px;
border-radius:10px;
}

.timeline-item h4{
font-size:20px;
margin-bottom:10px;
}

.timeline-item p{
color:#bbb;
line-height:1.7;
}

/* 曲リンク */
.song{
color:#4fc3f7;
cursor:pointer;
text-decoration:underline;
}

/* レスポンシブ */
@media(max-width:768px){
.modal iframe{width:95%;height:50%;}
}

footer{text-align:center;padding:40px;color:#777;}
</style>
</head>

<body>

<header>
<h1>CHAGE & ASKA</h1>
<nav><a href="#music">MUSIC</a></nav>
</header>

<section class="hero">
<img src="image1.jpg" class="active">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">

<div class="hero-content">
<h2>CHAGE & ASKA</h2>
<p>Timeless Voices, Eternal Melodies</p>
</div>
</section>

<section id="music">

<h3>MUSIC</h3>

<div class="video-grid">

<div class="video-card" onclick="openVideo('Q9qAyt0G-jM')">
<div class="video-thumb" style="background-image:url('https://img.youtube.com/vi/Q9qAyt0G-jM/0.jpg')"></div>
<h4>SAY YES</h4>
</div>

<div class="video-card" onclick="openVideo('yfZIaTZJo0o')">
<div class="video-thumb" style="background-image:url('https://img.youtube.com/vi/yfZIaTZJo0o/0.jpg')"></div>
<h4>YAH YAH YAH</h4>
</div>

<div class="video-card" onclick="openVideo('djfjKhzPzGU')">
<div class="video-thumb" style="background-image:url('https://img.youtube.com/vi/djfjKhzPzGU/0.jpg')"></div>
<h4>LOVE SONG</h4>
</div>

</div>

<!-- HISTORY -->
<div class="history">
<h3>HISTORY</h3>

<div class="timeline">

<div class="timeline-item">
<h4>1979年</h4>
<p>
デビュー。「ひとり咲き」で注目。  
代表曲：<span class="song" onclick="openVideo('Q9qAyt0G-jM')">ひとり咲き</span>
</p>
<img src="image1.jpg">
</div>

<div class="timeline-item">
<h4>1991年</h4>
<p>
「<span class="song" onclick="openVideo('Q9qAyt0G-jM')">SAY YES</span>」が社会現象。
</p>
<img src="image2.jpg">
</div>

<div class="timeline-item">
<h4>1993年</h4>
<p>
「<span class="song" onclick="openVideo('yfZIaTZJo0o')">YAH YAH YAH</span>」ミリオン。
</p>
<img src="image3.jpg">
</div>

<div class="timeline-item">
<h4>2007年</h4>
<p>活動休止。</p>
<img src="image4.jpg">
</div>

</div>
</div>

</section>

<!-- モーダル -->
<div class="modal" id="modal" onclick="closeVideo()">
<iframe id="player" src="" allowfullscreen></iframe>
</div>

<footer>
<p>© Tribute Site</p>
</footer>

<script>
// スライド
const imgs=document.querySelectorAll(".hero img");
let c=0;
setInterval(()=>{
imgs[c].classList.remove("active");
c=(c+1)%imgs.length;
imgs[c].classList.add("active");
},3000);

// 動画モーダル
function openVideo(id){
document.getElementById("modal").style.display="flex";
document.getElementById("player").src="https://www.youtube.com/embed/"+id+"?autoplay=1";
}

function closeVideo(){
document.getElementById("modal").style.display="none";
document.getElementById("player").src="";
}

// スクロールアニメーション
const items=document.querySelectorAll(".timeline-item");

window.addEventListener("scroll",()=>{
items.forEach(item=>{
const pos=item.getBoundingClientRect().top;
if(pos<window.innerHeight-100){
item.classList.add("show");
}
});
});
</script>

</body>
</html>
