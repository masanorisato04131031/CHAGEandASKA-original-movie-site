<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CHAGE and ASKA Tribute</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Helvetica Neue",Arial;}
body{background:#0a0a0a;color:#fff;}

/* ヘッダー */
header{
position:fixed;width:100%;padding:20px 40px;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
z-index:1000;display:flex;justify-content:space-between;
}

nav a{margin-left:20px;text-decoration:none;color:#aaa;}
nav a:hover{color:#fff;}

/* ヒーロー */
.hero{height:100vh;position:relative;overflow:hidden;}
.hero img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:1.5s;}
.hero img.active{opacity:1;}

.hero::after{
content:"";position:absolute;width:100%;height:100%;
background:linear-gradient(to bottom,rgba(0,0,0,0.3),rgba(0,0,0,0.8));
}

.hero-content{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:2;text-align:center;
}

/* セクション */
section{padding:100px 40px;max-width:1100px;margin:auto;}

h3{
font-size:28px;margin-bottom:30px;
border-left:3px solid #fff;padding-left:15px;
}

/* 動画 */
.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.video-card{
background:#111;padding:15px;border:1px solid #222;
transition:0.3s;border-radius:10px;
}

.video-card:hover{
transform:translateY(-8px);
border-color:#777;
box-shadow:0 10px 30px rgba(255,255,255,0.1);
}

.video-wrapper{position:relative;padding-top:56.25%;}
.video-wrapper iframe{
position:absolute;top:0;left:0;width:100%;height:100%;border:none;
}

/* LIVE */
.history{margin-top:80px;}

/* 年ボタン（強化版） */
.year-buttons{
display:flex;flex-wrap:wrap;gap:10px;margin-bottom:30px;
}

.year-btn{
padding:10px 16px;
border:1px solid #333;
background:#111;
cursor:pointer;
transition:0.3s;
border-radius:20px;
}

.year-btn:hover{
border-color:#fff;
}

.year-btn.active{
background:#fff;
color:#000;
box-shadow:0 0 10px rgba(255,255,255,0.8);
}

/* カード */
.live-card{
background:linear-gradient(145deg,#111,#0a0a0a);
border:1px solid #222;
padding:20px;
margin-bottom:20px;
border-radius:15px;
transition:0.4s;
}

.live-card:hover{
transform:translateY(-6px);
border-color:#888;
box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

/* 曲リスト */
.song{
display:flex;
margin-bottom:6px;
color:#bbb;
}

.song span{
display:inline-block;
width:30px;
color:#fff;
font-weight:bold;
}

/* アニメーション */
.fade{
opacity:0;
transform:translateY(20px);
transition:0.6s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

footer{text-align:center;padding:40px;color:#777;}
</style>
</head>

<body>

<header>
<h1>CHAGE & ASKA</h1>
<nav><a href="#music">MUSIC</a></nav>
</header>

<section class="hero">
<img src="image1.jpg" class="active">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
<div class="hero-content">
<h2>CHAGE & ASKA</h2>
<p>Timeless Voices, Eternal Melodies</p>
</div>
</section>

<section id="music">
<h3>DISCOGRAPHY</h3>

<div class="video-grid">
<div class="video-card"><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/Q9qAyt0G-jM"></iframe></div><h4>SAY YES</h4></div>
<div class="video-card"><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/yfZIaTZJo0o"></iframe></div><h4>YAH YAH YAH</h4></div>
<div class="video-card"><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/djfjKhzPzGU"></iframe></div><h4>LOVE SONG</h4></div>
</div>

<!-- LIVE -->
<div class="history">
<h3>LIVE Setlist</h3>

<div id="yearButtons" class="year-buttons"></div>

<div id="setlistContainer"></div>
</div>

</section>

<footer><p>© Tribute Site</p></footer>

<script>

/* データ例（既存のまま拡張OK） */
const setlists={
"1984":[{title:"21世紀への招待 Part2",songs:["Darlin'","夢のかなた","RAINBOW"]}],
"1985":[{title:"SHAKIN' NIGHT",songs:["SHAKIN'NIGHT","誘惑のベルが鳴る"]}]
};

/* ボタン生成 */
const yearButtons=document.getElementById("yearButtons");

Object.keys(setlists).forEach(year=>{
const btn=document.createElement("div");
btn.className="year-btn";
btn.innerText=year;

btn.onclick=()=>{
document.querySelectorAll(".year-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render(year);
};

yearButtons.appendChild(btn);
});

/* 描画 */
function render(year){
const container=document.getElementById("setlistContainer");
const data=setlists[year];

let html="";

data.forEach(live=>{
let songs="";
live.songs.forEach((s,i)=>{
songs+=`<div class="song"><span>${i+1}</span>${s}</div>`;
});

html+=`
<div class="live-card fade">
<h4>${year}年『${live.title}』</h4>
${songs}
</div>`;
});

container.innerHTML=html;

setTimeout(()=>{
document.querySelectorAll(".fade").forEach(el=>el.classList.add("show"));
},100);
}

/* 初期 */
const first=document.querySelector(".year-btn");
first.classList.add("active");
render(first.innerText);

/* スライド */
const images=document.querySelectorAll(".hero img");
let current=0;
setInterval(()=>{
images[current].classList.remove("active");
current=(current+1)%images.length;
images[current].classList.add("active");
},3000);

</script>

</body>
</html>
