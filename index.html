<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CHAGE and ASKA Tribute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #fff;
    }

    header {
      position: fixed;
      width: 100%;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #aaa;
    }

    nav a:hover {
      color: #fff;
    }

    /* ===== ヒーロー ===== */
    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s;
    }

    .hero img.active {
      opacity: 1;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .hero-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
    }

    /* ===== セクション ===== */
    section {
      padding: 100px 40px;
      max-width: 1100px;
      margin: auto;
    }

    h3 {
      font-size: 28px;
      margin-bottom: 30px;
      border-left: 3px solid #fff;
      padding-left: 15px;
    }

    /* ===== 動画 ===== */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .video-card {
      background: #111;
      padding: 15px;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .video-card:hover {
      transform: translateY(-5px);
      border-color: #555;
    }

    .video-wrapper {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-card h4 {
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>CHAGE & ASKA</h1>
  <nav>
    <a href="#music">MUSIC</a>
  </nav>
</header>

<!-- ===== 画像スライド ===== -->
<section class="hero">
  <img src="image1.jpg" class="active">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">

  <div class="hero-content">
    <h2>CHAGE & ASKA</h2>
    <p>Timeless Voices, Eternal Melodies</p>
  </div>
</section>

<!-- ===== DISCOGRAPHY（動画） ===== -->
<section id="music">
  <h3>DISCOGRAPHY</h3>

  <div class="video-grid">

    <!-- SAY YES -->
    <div class="video-card">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/Q9qAyt0G-jM" allowfullscreen></iframe>
      </div>
      <h4>SAY YES</h4>
      <p>代表曲のひとつ。</p>
    </div>

    <!-- YAH YAH YAH -->
    <div class="video-card">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/yfZIaTZJo0o" allowfullscreen></iframe>
      </div>
      <h4>YAH YAH YAH</h4>
      <p>エネルギッシュな名曲。</p>
    </div>

    <!-- LOVE SONG -->
    <div class="video-card">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/djfjKhzPzGU" allowfullscreen></iframe>
      </div>
      <h4>LOVE SONG</h4>
      <p>心に響くバラード。</p>
    </div>

  </div>
</section>

<footer>
  <p>© Tribute Site</p>
</footer>

<script>
  // ===== 画像スライド =====
  const images = document.querySelectorAll(".hero img");
  let current = 0;

  setInterval(() => {
    images[current].classList.remove("active");
    current = (current + 1) % images.length;
    images[current].classList.add("active");
  }, 3000);
</script>

</body>
</html>
