<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CHAGE and ASKA Tribute</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Helvetica Neue",Arial;}
body{background:#0a0a0a;color:#fff;}

header{
position:fixed;width:100%;padding:20px 40px;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
z-index:1000;display:flex;justify-content:space-between;
}

nav a{margin-left:20px;text-decoration:none;color:#aaa;}
nav a:hover{color:#fff;}

.hero{height:100vh;position:relative;overflow:hidden;}
.hero img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:1.5s;}
.hero img.active{opacity:1;}
.hero::after{content:"";position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.5);}

.hero-content{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:2;text-align:center;
}

section{padding:100px 40px;max-width:1100px;margin:auto;}

h3{
font-size:28px;margin-bottom:30px;
border-left:3px solid #fff;padding-left:15px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.video-card{
background:#111;padding:15px;border:1px solid #222;
transition:.3s;
}
.video-card:hover{transform:translateY(-5px);border-color:#555;}

.video-wrapper{position:relative;padding-top:56.25%;}
.video-wrapper iframe{
position:absolute;top:0;left:0;width:100%;height:100%;
border:none;
}

/* UI */
.controls{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.controls input,.controls select{
padding:8px;background:#111;border:1px solid #444;color:#fff;
}

/* timeline */
.history{margin-top:80px;}
.timeline{border-left:2px solid #555;padding-left:20px;}
.timeline-item{margin-bottom:25px;}
.timeline-item h4{font-size:18px;margin-bottom:5px;}
.timeline-item p{color:#bbb;line-height:1.6;}

footer{text-align:center;padding:40px;color:#777;}
</style>
</head>

<body>

<header>
<h1>CHAGE & ASKA</h1>
<nav><a href="#music">MUSIC</a></nav>
</header>

<section class="hero">
<img src="image1.jpg" class="active">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">

<div class="hero-content">
<h2>CHAGE & ASKA</h2>
<p>Timeless Voices, Eternal Melodies</p>
</div>
</section>

<section id="music">

<h3>DISCOGRAPHY</h3>

<div class="video-grid">
<div class="video-card">
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/Q9qAyt0G-jM"></iframe>
</div>
<h4>SAY YES</h4>
</div>

<div class="video-card">
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/yfZIaTZJo0o"></iframe>
</div>
<h4>YAH YAH YAH</h4>
</div>

<div class="video-card">
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/djfjKhzPzGU"></iframe>
</div>
<h4>LOVE SONG</h4>
</div>
</div>

<!-- ===== 完全ディスコグラフィ ===== -->
<div class="history">
<h3>FULL DISCOGRAPHY (Wikipedia Structure)</h3>

<div class="controls">
<input type="text" id="search" placeholder="検索（曲・アルバム）">
<select id="yearFilter">
<option value="">すべての年</option>
</select>
</div>

<div class="timeline" id="discography"></div>
</div>

<!-- 既存HISTORY維持 -->
<div class="history">
<h3>HISTORY</h3>
<div class="timeline">
<div class="timeline-item"><h4>1979年</h4><p>デビュー</p></div>
<div class="timeline-item"><h4>1991年</h4><p>SAY YES 大ヒット</p></div>
<div class="timeline-item"><h4>1993年</h4><p>YAH YAH YAH ミリオン</p></div>
<div class="timeline-item"><h4>2007年</h4><p>活動休止</p></div>
</div>
</div>

</section>

<footer>
<p>© Tribute Site</p>
</footer>

<script>
// ===== スライド =====

let current=0;
setInterval(()=>{

current=(current+1)%images.length;

// ===== Wikipedia構造完全対応データ =====
// ※ここにいくらでも追加可能（完全一致化ポイント）

// 年フィルタ
const yearSelect=document.getElementById("yearFilter");
discography.forEach(d=>{
let opt=document.createElement("option");
opt.value=d.year;
opt.textContent=d.year+"年";
yearSelect.appendChild(opt);
});

// 描画
function render(){
const container=document.getElementById("discography");
container.innerHTML="";

const keyword=document.getElementById("search").value;
const year=document.getElementById("yearFilter").value;

discography
.filter(d=>{
const matchYear=!year||d.year==year;
const text=(d.singles.join("")+d.albums.join(""));
const matchText=text.includes(keyword);
return matchYear&&matchText;
})
.forEach(d=>{
const div=document.createElement("div");
div.className="timeline-item";

div.innerHTML=`
<h4>${d.year}年</h4>
<p>
シングル：${d.singles.join(" / ")||"なし"}<br>
アルバム：${d.albums.join(" / ")||"なし"}
</p>
`;

container.appendChild(div);
});
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("yearFilter").addEventListener("change",render);

render();
</script>

</body>
</html>
